name: tamarind
title: Tamarind
contact: hello@dev.tamarind
license: Apache-2.0
issues: https://github.com/dev-tamarind/tamarind/issues
website: https://github.com/dev-tamarind/tamarind
base: core24
version: 1.0.0
summary: Local-first P2P collaborative whiteboard
description: |
  Tamarind is a local-first, peer-to-peer collaborative whiteboard built on
  Electron and Holepunch Pear. Designed for teams working in network-congested
  environments like stadiums, concerts, and coffee shops.
icon: build/icon.png
grade: stable
confinement: strict

parts:
  tamarind:
    plugin: dump
    source: __SOURCE__
    stage-packages:
      - libatomic1

apps:
  tamarind:
    command: tamarind --no-sandbox
    desktop: tamarind.desktop
    extensions: [gnome]
    plugs:
      - desktop
      - desktop-legacy
      - home
      - x11
      - wayland
      - audio-playback
      - audio-record
      - camera
      - opengl
      - network
      - network-bind
      - browser-support
      - network-status
    environment:
      TMPDIR: $XDG_RUNTIME_DIR
