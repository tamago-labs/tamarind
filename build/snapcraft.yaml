name: __NAME__
title: __TITLE__
contact: __CONTACT__
license: __LICENSE__
issues: __ISSUES__
website: __WEBSITE__
base: core24
version: __VERSION__
summary: __SUMMARY__
description: __DESCRIPTION__
icon: __ICON__
grade: stable
confinement: strict

parts:
  hellopear:
    plugin: dump
    source: __SOURCE__
    stage-packages:
      - libatomic1

apps:
  hellopear:
    command: __BIN__ --no-sandbox
    desktop: __DESKTOP__
    extensions: [gnome]
    plugs:
      - desktop
      - desktop-legacy
      - home
      - x11
      - wayland
      - audio-playback
      - audio-record
      - camera
      - opengl
      - network
      - network-bind
      - browser-support
      - network-status
    environment:
      TMPDIR: $XDG_RUNTIME_DIR
